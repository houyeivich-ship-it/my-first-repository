<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    
    <style>
        body {
            font-family: 'Khmer OS Battambang', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #1a73e8; }
        p { color: #555; }
        .btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #1557b0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>សួស្តីពិភពលោក!</h1>
        <p>នេះគឺជាទំព័រ index.html ដែលមានកូដពេញលេញក្នុងឯកសារតែមួយ។</p>
        <button class="btn" onclick="sayHello()">សាកល្បងចុចទីនេះ</button>
        <p id="message" style="margin-top: 20px; font-weight: bold; color: green;"></p>
    </div>

    <script>
        function sayHello() {
            const msg = document.getElementById('message');
            msg.innerText = "អបអរសាទរ! អ្នកបានដំណើរការកូដនេះជោគជ័យ។";
        }
    </script>

</body>
</html>
